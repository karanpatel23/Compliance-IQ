services:
  - type: web
    name: compliance-iq
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:$PORT app.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BACKUP_DIR
        value: /tmp/backups
