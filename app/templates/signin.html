{% extends "base.html" %}
{% block title %}Sign In · Compliance IQ{% endblock %}
{% block content %}
<div class="auth-wrap">
  <form class="card auth" method="post" action="/signin">
    <h2>Welcome back</h2>
    <p>Sign in to continue to your compliance workspace.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label>Email
      <input type="email" name="email" required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button class="btn primary" type="submit">Sign in</button>
    <p class="muted">No account? <a href="/signup">Create one</a>.</p>
  </form>
</div>
{% endblock %}
