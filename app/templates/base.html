<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Compliance IQ{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Compliance IQ</div>
    <nav>
      <a href="/">Home</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/tool">Tool</a>
      <a href="/api/overview">Overview API</a>
      <a href="/readiness/checklist">Readiness</a>
      {% if user %}
      <a href="/signout">Sign out</a>
      {% else %}
      <a href="/signin">Sign in</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
